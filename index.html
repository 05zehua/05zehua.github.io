        </button>
    </div>

    <div class="footer-version">
        版本: 260323 | 最近更新: 改进深色模式
    </div>

    <script>
        let currentModalImages = [];
        let currentModalIndex = 0;

        function openModal(src, urls = []) {
            currentModalImages = urls.length > 0 ? urls : [src];
            currentModalIndex = currentModalImages.indexOf(src);
            if (currentModalIndex === -1) currentModalIndex = 0;

            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-image');

            modalImg.src = currentModalImages[currentModalIndex];
            modal.style.display = 'flex';
            updateModalButtons();

            // 阻止背景点击关闭事件冒泡到图片上
            modalImg.onclick = (e) => e.stopPropagation();
        }

        function closeModal() {
            document.getElementById('image-modal').style.display = 'none';
        }

        function navigateModal(diff) {
            const newIndex = currentModalIndex + diff;
            if (newIndex >= 0 && newIndex < currentModalImages.length) {
                currentModalIndex = newIndex;
                const modalImg = document.getElementById('modal-image');

                // 简单的切换动画效果
                modalImg.style.transform = 'scale(0.95)';
                modalImg.style.opacity = '0.5';

                setTimeout(() => {
                    modalImg.src = currentModalImages[currentModalIndex];
                    modalImg.style.transform = 'scale(1)';
                    modalImg.style.opacity = '1';
                    updateModalButtons();
                }, 100);
            }
        }

        function updateModalButtons() {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            if (currentModalImages.length <= 1) {
                prevBtn.style.display = 'none';
                nextBtn.style.display = 'none';
            } else {
                prevBtn.style.display = 'flex';
                nextBtn.style.display = 'flex';

                // 边界状态处理：第一张隐藏左按钮，最后一张隐藏右按钮
                if (currentModalIndex === 0) prevBtn.classList.add('disabled');
                else prevBtn.classList.remove('disabled');

                if (currentModalIndex === currentModalImages.length - 1) nextBtn.classList.add('disabled');
                else nextBtn.classList.remove('disabled');
            }
        }

        async function fetchNotifications() {
            try {
                const response = await fetch('./data.json?t=' + new Date().getTime());
                if (!response.ok) return [];
                return await response.json();
            } catch (error) {
                console.error('获取通知失败:', error);
                return [];
            }
        }

        async function render() {
            const notifications = await fetchNotifications();
            const now = new Date();
            let activeNotifs = [];
            let maxLongTerm = 0;
            let maxInstant = 0;

            notifications.forEach(n => {
                const pubTime = new Date(n.publishTime).getTime();
                if (n.type === 'long-term') {
                    if (pubTime > maxLongTerm) maxLongTerm = pubTime;
                } else {
                    if (pubTime > maxInstant) maxInstant = pubTime;
                }

                const formatTime = (isoString) => {
                    if (!isoString) return '';
                    const d = new Date(isoString);
                    const M = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    // 如果原始字符串中没有包含时间部分（没有'T'也没有空格，通常长度<=10）
                    // 则认为只输入了日期，不展示具体的时分
                    if (isoString.length <= 10 && !isoString.includes('T') && !isoString.includes(' ')) {
                        return `${M}.${day}`;
                    }
                    const h = String(d.getHours()).padStart(2, '0');
                    const m = String(d.getMinutes()).padStart(2, '0');
                    return `${M}.${day} ${h}:${m}`;
                };

                let timeType = n.timeType || 'deadline';
                let status = 'normal', timeText = '', label = timeType === 'ongoing' ? '进行时间' : '距离截止';
                let diffMs = Infinity;
                let deadlineTime = null;

                if (timeType === 'ongoing') {
                    const startText = formatTime(n.ongoingStart);
                    const endText = formatTime(n.ongoingEnd);
                    if (startText && endText) {
                        timeText = `${startText} ~ ${endText}`;
                    } else if (startText) {
                        timeText = `${startText} 开始`;
                    } else if (endText) {
                        timeText = ` ~ ${endText} 结束`;
                    } else {
                        timeText = '长期进行';
                    }

                    let isUrgentByStart = false;
                    if (n.ongoingStart) {
                        const startTime = new Date(n.ongoingStart);
                        const startDiffMs = startTime - now;
                        // 如果距离开始时间不到24小时，或者刚开始不到24小时
                        if (startDiffMs >= -24 * 60 * 60 * 1000 && startDiffMs <= 24 * 60 * 60 * 1000) {
                            isUrgentByStart = true;
                        }
                    }

                    if (n.isUrgent || isUrgentByStart) {
                        status = 'urgent';
                    }

                    if (n.ongoingEnd) {
                        deadlineTime = new Date(n.ongoingEnd);
                        diffMs = deadlineTime - now;
                        const diffHours = diffMs / (1000 * 60 * 60);
                        if (diffHours < -24) return;
                        if (diffMs < 0) {
                            status = 'expired';
                            timeText = '已结束';
                        }
                    } else if (n.ongoingStart) {
                        // 如果没有结束时间，把开始时间作为结束时间来判断是否过期
                        deadlineTime = new Date(n.ongoingStart);
                        diffMs = deadlineTime - now;
                        const diffHours = diffMs / (1000 * 60 * 60);
                        if (diffHours < -24) return;
                        if (diffMs < 0) {
                            status = 'expired';
                            timeText = '已结束';
                        }
                    } else {
                        // 如果连开始时间都没有，当成无限期进行处理
                        deadlineTime = new Date('2099-12-31');
                        diffMs = deadlineTime - now;
                    }
                } else {
                    if (!n.deadline) {
                        label = '有效期';
                        timeText = '长期有效';
                        if (n.isUrgent) status = 'urgent';
                    } else if (n.deadline === 'TBD') {
                        label = '时间';
                        timeText = '待定';
                        if (n.isUrgent) status = 'urgent';
                    } else {
                        deadlineTime = new Date(n.deadline);
                        diffMs = deadlineTime - now;
                        const diffHours = diffMs / (1000 * 60 * 60);
                        if (diffHours < -24) return;

                        if (diffMs < 0) {
                            status = 'expired';
                            label = '已过期';
                            timeText = `${Math.floor(Math.abs(diffHours))}小时前`;
                        } else {
                            if (n.isUrgent || diffMs < 3 * 24 * 60 * 60 * 1000) {
                                status = 'urgent';
                            }
                            const d = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                            const h = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                            const m = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                            timeText = `${d}天 ${h}小时 ${m}分钟`;
                        }
                    }
                }
                activeNotifs.push({ ...n, diffMs, status, label, timeText, deadlineTime });
            });

            activeNotifs.sort((a, b) => {
                // 已过期的排在最后
                if (a.status === 'expired' && b.status !== 'expired') return 1;
                if (a.status !== 'expired' && b.status === 'expired') return -1;

                // 紧急（红色）的排在最前面
                if (a.status === 'urgent' && b.status !== 'urgent') return -1;
                if (a.status !== 'urgent' && b.status === 'urgent') return 1;

                // 同样状态下按距离截止时间排序
                if (a.status !== 'expired') return a.diffMs - b.diffMs;
                return b.deadlineTime - a.deadlineTime;
            });


            let longIndex = 0, instantIndex = 0;
            let longHtml1 = '', longHtml2 = '';
            let instantHtml1 = '', instantHtml2 = '';
            let longCol1Height = 0, longCol2Height = 0;
            let instantCol1Height = 0, instantCol2Height = 0;

            activeNotifs.forEach(n => {
                const pubDateObj = new Date(n.publishTime);
                const pubDate = `${pubDateObj.getFullYear()}.${pubDateObj.getMonth() + 1}.${pubDateObj.getDate()} ${pubDateObj.getHours()}:${pubDateObj.getMinutes().toString().padStart(2, '0')}`;

                const imageList = (n.images && n.images.length > 0) ? n.images : [];
                const imgs = imageList.length > 0
                    ? imageList.map(src => `<img src="${src}" alt="通知配图" loading="lazy" onclick="openModal('${src}', ${JSON.stringify(imageList).replace(/"/g, '&quot;')})">`).join('')
                    : '';

                const targetText = n.target ? n.target : '全体';
                const locHtml = (n.location && n.location.trim() !== '') ?
                    `<span class="meta-sep">|</span>
                            <span class="meta-item"><span class="meta-label">地点:</span> <span class="deadline">${n.location}</span></span>` : '';

                let currentOrder = n.type === 'long-term' ? longIndex : instantIndex;

                // 处理 Markdown 语法
                let processedContent = n.content
                    .replace(/~~(.*?)~~/g, '<del>$1</del>')
                    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                    .replace(/\*(.*?)\*/g, '<i>$1</i>')
                    .replace(/`(.*?)`/g, '<code>$1</code>')
                    .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>');

                // 处理以 * 开头的无序列表
                const lines = processedContent.split('\n');
                let inList = false;
                let finalLines = [];

                lines.forEach((line, idx) => {
                    const trimmedLine = line.trim();
                    if (trimmedLine.startsWith('* ')) {
                        if (!inList) {
                            finalLines.push('<ul style="margin: 4px 0; padding-left: 20px; list-style-position: outside;">');
                            inList = true;
                        }
                        finalLines.push(`<li>${trimmedLine.substring(2)}</li>`);
                    } else {
                        if (inList) {
                            finalLines.push('</ul>');
                            inList = false;
                            // 如果列表后面的紧接的是个空行，去掉这个空行产生的不必要换行
                            if (trimmedLine === '') return;
                        }
                        // 如果空行紧接在列表前面，也去掉，防止列表前间距过大
                        if (trimmedLine === '' && idx + 1 < lines.length && lines[idx + 1].trim().startsWith('* ')) {
                            return;
                        }
                        // 给非列表行增加换行，除非是最后一行
                        finalLines.push(line + (idx < lines.length - 1 ? '<br>' : ''));
                    }
                });
                if (inList) finalLines.push('</ul>');
                processedContent = finalLines.join('');

                // 重写倒计时红圈逻辑：分别计算开始和结束时间的差值
                let ringHtml = '';
                const threeDaysMs = 3 * 24 * 60 * 60 * 1000;
                let showRing = false;
                let ringRatio = 0;

                // 优先检查即将开始的倒计时
                if (n.ongoingStart) {
                    const startDiffMs = new Date(n.ongoingStart) - now;
                    if (startDiffMs > 0 && startDiffMs <= threeDaysMs) {
                        showRing = true;
                        ringRatio = startDiffMs / threeDaysMs;
                    }
                }
                // 如果没有即将开始的倒计时，检查即将截止的倒计时
                if (!showRing) {
                    const endTarget = n.ongoingEnd || n.deadline;
                    if (endTarget && endTarget !== 'TBD') {
                        const endDiffMs = new Date(endTarget) - now;
                        if (endDiffMs > 0 && endDiffMs <= threeDaysMs) {
                            showRing = true;
                            ringRatio = endDiffMs / threeDaysMs;
                        }
                    }
                }

                if (showRing) {
                    const r = 10;
                    const c = 2 * Math.PI * r; // 圆周长约 62.83
                    const offset = c * (1 - ringRatio);
                    ringHtml = `
                        <svg class="countdown-ring" viewBox="0 0 24 24">
                            <circle class="ring-bg" cx="12" cy="12" r="10"></circle>
                            <circle class="ring-progress" cx="12" cy="12" r="10" style="--target-offset: ${offset};"></circle>
                        </svg>
                    `;
                }

                const html = `
                    <div class="card ${n.status}" style="order: ${currentOrder};">
                        <h3>${n.title}</h3>
                        <div class="meta">
                            <span class="meta-item">${pubDate}</span>
                            <span class="meta-sep">|</span>
                            <span class="meta-item"><span class="meta-label">对象:</span> <span class="target-text">${targetText}</span></span>
                            ${locHtml}
                            <span class="meta-sep">|</span>
                            <span class="meta-item"><span class="meta-label">${n.label}:</span> <span class="deadline">${n.timeText}</span>${ringHtml}</span>
                        </div>
                        <div class="content-text" style="line-height: 1.6;">${processedContent}</div>
                        ${imgs ? `<div class="images">${imgs}</div>` : ''}
                    </div>
                `;

                // 预估卡片高度以实现更均衡的瀑布流
                let estimatedHeight = 150; // 标题和meta等基础高度
                if (n.content) {
                    estimatedHeight += (n.content.length / 25) * 28; // 预估文本折行
                    const newlines = (n.content.match(/\n/g) || []).length;
                    estimatedHeight += newlines * 28; // 回车换行
                }
                if (n.images && n.images.length > 0) {
                    estimatedHeight += 160 * Math.ceil(n.images.length / 2); // 预估图片高度
                }

                if (n.type === 'long-term') {
                    if (longCol1Height <= longCol2Height) {
                        longHtml1 += html;
                        longCol1Height += estimatedHeight;
                    } else {
                        longHtml2 += html;
                        longCol2Height += estimatedHeight;
                    }
                    longIndex++;
                } else {
                    if (instantCol1Height <= instantCol2Height) {
                        instantHtml1 += html;
                        instantCol1Height += estimatedHeight;
                    } else {
                        instantHtml2 += html;
                        instantCol2Height += estimatedHeight;
                    }
                    instantIndex++;
                }
            });

            const longContainer = document.getElementById('long-term-container');
            if (longIndex === 0) {
                longContainer.innerHTML = '<p style="color:#999;">暂无通知</p>';
            } else {
                longContainer.innerHTML = `
                    <div class="masonry-column">${longHtml1}</div>
                    <div class="masonry-column">${longHtml2}</div>
                `;
            }

            const instantContainer = document.getElementById('instant-container');
            if (instantIndex === 0) {
                instantContainer.innerHTML = '<p style="color:#999;">暂无通知</p>';
            } else {
                instantContainer.innerHTML = `
                    <div class="masonry-column">${instantHtml1}</div>
                    <div class="masonry-column">${instantHtml2}</div>
                `;
            }

            // 更新分类更新时间
            const formatDate = (ts) => {
                if (!ts) return '';
                const d = new Date(ts);
                return `${d.getFullYear()}.${d.getMonth() + 1}.${d.getDate()}`;
            };
            if (maxLongTerm) document.getElementById('long-term-update').innerText = `最后更新: ${formatDate(maxLongTerm)}`;
            else document.getElementById('long-term-update').style.display = 'none';

            if (maxInstant) document.getElementById('instant-update').innerText = `最后更新: ${formatDate(maxInstant)}`;
            else document.getElementById('instant-update').style.display = 'none';

            return notifications;
        }

        async function updateLastModified(notifications) {
            const lastUpdateElem = document.getElementById('last-update');
            if (notifications && notifications.length > 0) {
                const timestamps = notifications.map(n => new Date(n.publishTime).getTime()).filter(t => !isNaN(t));
                if (timestamps.length > 0) {
                    const latest = Math.max(...timestamps);
                    const date = new Date(latest);
                    const displayDate = `${date.getFullYear()}.${date.getMonth() + 1}.${date.getDate()}`;
                    lastUpdateElem.innerText = `最后更新: ${displayDate}`;
                } else {
                    lastUpdateElem.style.display = 'none';
                }
            } else {
                lastUpdateElem.style.display = 'none';
            }
        }

        async function fetchTimeline() {
            try {
                const response = await fetch('./timeline.json?t=' + new Date().getTime());
                if (!response.ok) return [];
                return await response.json();
            } catch (error) {
                console.error('获取时间轴失败:', error);
                return [];
            }
        }

        function wrapUrls(text) {
            if (!text) return '';
            const urlRegex = /(https?:\/\/[^\s<]+)/g;
            // 处理 URL 包装
            let processed = text.replace(urlRegex, '<a href="$1" target="_blank">$1</a>');
            // 处理 Markdown 粗体 **内容** -> <strong>内容</strong>
            processed = processed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // 处理换行符
            return processed.replace(/\n/g, '<br>');
        }

        async function renderTimelineWidget() {
            const data = await fetchTimeline();
            const now = new Date();
            const rightText = `${now.getFullYear()}.${now.getMonth() + 1}.${now.getDate()}`;
            document.getElementById('dynamic-right-endpoint').innerText = rightText;

            const nodesContainer = document.getElementById('timeline-nodes-container');
            if (!data || data.length === 0) {
                nodesContainer.innerHTML = '<div style="margin: auto; color: #999; padding: 20px; text-align: center;">暂无数据</div>';
                return;
            }

            // 强制将数据做升序重排，确保最早期节点排第一位（绝对定位为最左）
            data.sort((a, b) => {
                const timeA = new Date(a.date.replace(/\./g, '/')).getTime();
                const timeB = new Date(b.date.replace(/\./g, '/')).getTime();
                if (isNaN(timeA)) return 1;
                if (isNaN(timeB)) return -1;
                return timeA - timeB;
            });

            const startTime = new Date('2025/09/01 00:00:00').getTime();
            const currTime = now.getTime();
            // 如果最后一个时间点超过现在，动态让右端点为最大时间，否则以当前时间为准
            const maxItemTime = Math.max(...data.map(d => new Date(d.date.replace(/\./g, '/')).getTime() || 0));
            const endTime = Math.max(currTime, maxItemTime);
            const totalDuration = endTime - startTime;

            let html = '';
            const nodePositions = [];

            data.forEach((item, index) => {
                const itemTime = new Date(item.date.replace(/\./g, '/')).getTime();
                let percentage = ((itemTime - startTime) / totalDuration) * 100;
                percentage = Math.max(0, Math.min(100, percentage));

                nodePositions.push(percentage);

                let imgsHtml = '';
                const images = item.images && item.images.length > 0 ? item.images : (item.image ? [item.image] : []);

                if (images.length > 0) {
                    imgsHtml = `<div class="timeline-images-scroll">`;
                    images.forEach(img => {
                        const cleanSrc = img.replace(/^\//, '');
                        imgsHtml += `<img src="${cleanSrc}" alt="timeline image" loading="lazy" onclick="openModal('${cleanSrc}', ${JSON.stringify(images).replace(/"/g, '&quot;')})">`;
                    });
                    imgsHtml += `</div>`;
                }
                const desc = wrapUrls(item.text);
                const posClass = index % 2 === 0 ? 'node-top' : 'node-bottom';

                html += `
                <div class="timeline-node ${posClass}" style="--percentage: ${percentage}%;">
                    <div class="node-hotspot"></div>
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <div class="timeline-date">${item.date || ''}</div>
                        ${imgsHtml}
                        <div class="timeline-desc">${desc}</div>
                    </div>
                </div>`;
            });

            nodesContainer.innerHTML = html;
            const nodes = nodesContainer.querySelectorAll('.timeline-node');

            // 【新增】：点击卡片/点位直接跳转
            nodes.forEach((node, i) => {
                const percentage = nodePositions[i];
                node.addEventListener('click', () => {
                    // 如果正在进行自动巡航，则停止它
                    if (thumb.classList.contains('hint')) {
                        thumb.classList.remove('hint');
                        if (hintAnimationId) {
                            cancelAnimationFrame(hintAnimationId);
                            hintAnimationId = null;
                        }
                    }
                    snapToNearest(percentage);
                });
            });

            // 隔离滑动事件，防止在图片区横向滑动时误触时间轴的拖拽
            const imgScrolls = nodesContainer.querySelectorAll('.timeline-images-scroll');
            imgScrolls.forEach(scroll => {
                const stopEvent = (e) => e.stopPropagation();
                scroll.addEventListener('mousedown', stopEvent);
                scroll.addEventListener('touchstart', stopEvent, { passive: true });
                scroll.addEventListener('mousemove', stopEvent);
                scroll.addEventListener('touchmove', stopEvent, { passive: true });
            });

            // 动态计算时间轴容器高度以自适应绝对定位的节点（仅桌面端需要）
            const containerNode = document.querySelector('.timeline-widget-container');
            const calculateDynamicPadding = () => {
                const isMobile = window.innerWidth <= 768;
                if (isMobile) {
                    // 彻底清理由于横屏切换到竖屏而残留的内联样式计算高度
                    containerNode.style.paddingTop = '';
                    containerNode.style.paddingBottom = '';
                    // 移动端：流式布局，高度由内容自动撑开，无需 JS 干预
                    return;
                }

                // 桌面端逻辑不变
                let maxTop = 0;
                let maxBottom = 0;
                nodes.forEach(node => {
                    const rectHeight = node.getBoundingClientRect().height;
                    const effectiveHeight = rectHeight * 1.1;
                    if (node.classList.contains('node-top')) {
                        if (effectiveHeight > maxTop) maxTop = effectiveHeight;
                    } else if (node.classList.contains('node-bottom')) {
                        if (effectiveHeight > maxBottom) maxBottom = effectiveHeight;
                    }
                });

                const safePaddingTop = maxTop + 80 + 40;
                const safePaddingBottom = maxBottom + 80 + 40;

                containerNode.style.paddingTop = `${safePaddingTop}px`;
                containerNode.style.paddingBottom = `${safePaddingBottom}px`;
            };

            calculateDynamicPadding();
            window.addEventListener('resize', calculateDynamicPadding);
            nodesContainer.querySelectorAll('img').forEach(img => {
                img.addEventListener('load', calculateDynamicPadding);
            });

            // ====== 移动端专用逻辑：单卡片视窗中心焦点检测 (requestAnimationFrame 优化) ======
            let tickingMobileScroll = false;
            const updateMobileFocus = () => {
                if (window.innerWidth > 768) {
                    tickingMobileScroll = false;
                    return;
                }

                const centerY = window.innerHeight / 2;
                let minDistance = Infinity;
                let closestNode = null;

                // 核心策略：通过 ClientRect 计算视区内每张卡片的垂直中心点距离屏幕中心点的绝对距离
                nodes.forEach(node => {
                    const rect = node.getBoundingClientRect();
                    const nodeCenter = rect.top + rect.height / 2;
                    const distance = Math.abs(nodeCenter - centerY);
                    if (distance < minDistance) {
                        minDistance = distance;
                        closestNode = node;
                    }
                });

                // 排他性中心检测：唯一的一张卡片被强调
                nodes.forEach(n => {
                    if (n === closestNode) {
                        n.classList.add('selected');
                    } else {
                        n.classList.remove('selected');
                    }
                });

                tickingMobileScroll = false;
            };

            window.addEventListener('scroll', () => {
                if (window.innerWidth <= 768) {
                    if (!tickingMobileScroll) {
                        window.requestAnimationFrame(updateMobileFocus);
                        tickingMobileScroll = true;
                    }
                }
            }, { passive: true });

            // 初次加载果断执行一次排他显示计算，并移除加载遮罩
            if (window.innerWidth <= 768) {
                updateMobileFocus();
                const mask = document.getElementById('timeline-loading-mask');
                if (mask) {
                    mask.style.opacity = '0';
                    mask.style.visibility = 'hidden';
                    mask.classList.remove('active');
                }
            }
            // =======================================================================

            const thumb = document.getElementById('timelineThumb');
            const progress = document.getElementById('timelineProgress');
            const track = document.getElementById('timelineTrack');

            if (!document.getElementById('thumb-tooltip')) {
                thumb.innerHTML = '<div id="thumb-tooltip" class="thumb-tooltip"></div>';
            }
            const thumbTooltip = document.getElementById('thumb-tooltip');

            let isDraggingThumb = false;

            // 新增一个状态缓存变量，放在 updateVisuals 外层
            let lastActiveIndex = -1;

            const updateVisuals = (percentage) => {
                const isMobile = window.innerWidth <= 768;
                if (isMobile) {
                    // 如果翻转到了竖屏模式，立刻中断桌面端的视觉运算（防止覆盖选中状态或浪费主线程）
                    return;
                }
                thumb.style.left = `${percentage}%`;
                thumb.style.top = '50%';
                progress.style.width = `${percentage}%`;
                progress.style.height = '100%';

                const currentMs = startTime + (percentage / 100) * totalDuration;
                const currentDate = new Date(currentMs);

                if (thumbTooltip) {
                    const newText = `${currentDate.getFullYear()}.${currentDate.getMonth() + 1}`;
                    // 性能优化 1：仅在文本内容确实发生改变时才写入 DOM
                    if (thumbTooltip.textContent !== newText) {
                        thumbTooltip.textContent = newText;
                    }

                    const newOpacity = (percentage < 8 || percentage > 92) ? '0' : '';
                    // 性能优化 2：避免每帧重复赋值 inline style
                    if (thumbTooltip.style.opacity !== newOpacity) {
                        thumbTooltip.style.opacity = newOpacity;
                    }
                }

                let minDiff = Infinity;
                let activeIndex = 0;
                nodePositions.forEach((pos, i) => {
                    const diff = Math.abs(pos - percentage);
                    if (diff < minDiff) {
                        minDiff = diff;
                        activeIndex = i;
                    }
                });

                // 核心性能优化：只有当焦点节点发生变化时，才操作 classList，彻底消除卡顿
                if (activeIndex !== lastActiveIndex) {
                    nodes.forEach((node, i) => {
                        if (i === activeIndex) {
                            node.classList.add('selected');
                        } else {
                            node.classList.remove('selected');
                        }
                    });
                    lastActiveIndex = activeIndex;
                }
            };

            const snapToNearest = (percentage) => {
                let minDiff = Infinity;
                let targetPercentage = percentage;

                nodePositions.forEach((pos) => {
                    const diff = Math.abs(pos - percentage);
                    if (diff < minDiff) {
                        minDiff = diff;
                        targetPercentage = pos;
                    }
                });

                const isMobile = window.innerWidth <= 768;
                thumb.style.transition = isMobile ? 'top 0.3s ease' : 'left 0.3s ease';
                progress.style.transition = isMobile ? 'height 0.3s ease' : 'width 0.3s ease';

                updateVisuals(targetPercentage);

                setTimeout(() => {
                    thumb.style.transition = 'box-shadow 0.2s, background 0.2s';
                    progress.style.transition = '';
                }, 300);
            };

            thumb.addEventListener('mousedown', (e) => {
                isDraggingThumb = true;
                thumb.classList.remove('hint');
                e.preventDefault();
            });

            thumb.addEventListener('touchstart', (e) => {
                isDraggingThumb = true;
                thumb.classList.remove('hint');
                // e.preventDefault(); // 移除以避免禁用原生滚动，或根据需要保留
            }, { passive: true });

            const handleMove = (e) => {
                if (!isDraggingThumb) return;
                const rect = track.getBoundingClientRect();
                const isMobile = window.innerWidth <= 768;
                let ratio;
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);

                if (isMobile) {
                    let y = clientY - rect.top;
                    ratio = y / rect.height;
                } else {
                    let x = clientX - rect.left;
                    ratio = x / rect.width;
                }
                ratio = Math.max(0, Math.min(1, ratio));
                updateVisuals(ratio * 100);
            };

            document.addEventListener('mousemove', handleMove);
            document.addEventListener('touchmove', (e) => {
                if (isDraggingThumb) {
                    handleMove(e);
                    if (e.cancelable) e.preventDefault();
                }
            }, { passive: false });

            const handleEnd = () => {
                if (isDraggingThumb) {
                    isDraggingThumb = false;
                    const isMobile = window.innerWidth <= 768;
                    const currentPercent = isMobile ? (parseFloat(thumb.style.top) || 0) : (parseFloat(thumb.style.left) || 0);
                    snapToNearest(currentPercent);
                }
            };

            document.addEventListener('mouseup', handleEnd);
            document.addEventListener('touchend', handleEnd);

            track.addEventListener('click', (e) => {
                if (e.target.closest('.timeline-content') || e.target === thumb) return;
                const rect = track.getBoundingClientRect();
                const isMobile = window.innerWidth <= 768;
                let ratio;
                if (isMobile) {
                    let y = e.clientY - rect.top;
                    ratio = y / rect.height;
                } else {
                    let x = e.clientX - rect.left;
                    ratio = x / rect.width;
                }
                ratio = Math.max(0, Math.min(1, ratio));
                snapToNearest(ratio * 100);
            });

            let hintAnimationId = null;
            const startHintAnimation = () => {
                const duration = 12000; // 动画总长 12 秒
                const startTime = performance.now();

                const fadeInStart = 0.03, fadeInEnd = 0.08;
                const fadeOutStart = 0.94; // 推迟到非常靠近终点才开始淡出
                const fadeOutEnd = 0.98;   // 98% 时完全透明，完美避开箭头重合

                const startT = fadeInStart;
                const endT = fadeOutEnd;

                const sortedNodes = [...nodePositions].sort((a, b) => a - b);
                const stopNodes = [];
                let lastStop = -100;
                sortedNodes.forEach(p => {
                    if (p - lastStop >= 0.25) {
                        stopNodes.push(p);
                        lastStop = p;
                    }
                });

                const n = stopNodes.length;
                // 动态分配停顿总时长，限制最高占比 35%
                const maxDwellTotal = (endT - startT) * 0.35;
                const dwellT = n > 0 ? Math.min(0.04, maxDwellTotal / n) : 0;

                const keyframes = [];
                const totalMovingTime = (endT - startT) - (n * dwellT);

                // 【核心优化】：调整权重分配策略
                const MIN_WEIGHT = 18; // 提高短距离基础权重，强行拉长密集区滑动时间
                const MAX_WEIGHT = 40; // 设置最高权重阈值，压缩超长空窗期的占用时间

                let totalWeight = 0;
                const moveWeights = [];

                let lastP = 0;
                stopNodes.forEach(nodeP => {
                    const d = nodeP - lastP;
                    // 综合应用上下限权重限制
                    const w = Math.max(Math.min(d, MAX_WEIGHT), MIN_WEIGHT);
                    moveWeights.push(w);
                    totalWeight += w;
                    lastP = nodeP;
                });
                const finalD = 100 - lastP;
                const finalW = Math.max(Math.min(finalD, MAX_WEIGHT), MIN_WEIGHT);
                totalWeight += finalW;

                let currT = startT;
                let currP = 0;

                keyframes.push({ t: currT, p: currP });

                stopNodes.forEach((nodeP, i) => {
                    const moveT = (moveWeights[i] / totalWeight) * totalMovingTime;

                    currT += moveT;
                    keyframes.push({ t: currT, p: nodeP }); // 到达节点

                    currT += dwellT;
                    keyframes.push({ t: currT, p: nodeP }); // 离开节点（完成停顿）

                    currP = nodeP;
                });

                const finalMoveT = (finalW / totalWeight) * totalMovingTime;
                currT += finalMoveT;
                keyframes.push({ t: Math.min(endT, currT), p: 100 });

                // 平滑缓动函数
                const easeInOut = (t) => 0.5 * (1 - Math.cos(Math.PI * t));

                const animate = (time) => {
                    if (!thumb.classList.contains('hint')) { thumb.style.opacity = ''; return; }
                    const progress = ((time - startTime) % duration) / duration;
                    let currentPercent = 0, opacity = 1;

                    if (progress < fadeInStart) opacity = 0;
                    else if (progress < fadeInEnd) opacity = (progress - fadeInStart) / (fadeInEnd - fadeInStart);
                    else if (progress > fadeOutEnd) opacity = 0;
                    else if (progress > fadeOutStart) opacity = (fadeOutEnd - progress) / (fadeOutEnd - fadeOutStart);

                    if (progress <= startT) currentPercent = 0;
                    else if (progress >= endT) currentPercent = 100;
                    else {
                        for (let i = 0; i < keyframes.length - 1; i++) {
                            const k1 = keyframes[i];
                            const k2 = keyframes[i + 1];
                            if (progress >= k1.t && progress <= k2.t) {
                                if (k1.p === k2.p) {
                                    currentPercent = k1.p; // 处于停顿时长内
                                } else {
                                    const tNorm = Math.max(0, Math.min(1, (progress - k1.t) / (k2.t - k1.t)));
                                    currentPercent = k1.p + (k2.p - k1.p) * easeInOut(tNorm); // 处于移动时长内
                                }
                                break;
                            }
                        }
                    }

                    updateVisuals(currentPercent);
                    thumb.style.opacity = opacity;
                    hintAnimationId = requestAnimationFrame(animate);
                };
                hintAnimationId = requestAnimationFrame(animate);
            };

            // Init at the first node
            if (nodePositions.length > 0) {
                thumb.style.transition = 'none';
                progress.style.transition = 'none';
                updateVisuals(0);
                thumb.classList.add('hint');
                startHintAnimation();
                setTimeout(() => {
                    thumb.style.transition = 'box-shadow 0.2s, background 0.2s';
                }, 50);

                // 强行显示 4s 动画后去除遮罩
                setTimeout(() => {
                    const mask = document.getElementById('timeline-loading-mask');
                    if (mask) {
                        mask.style.opacity = '0';
                        mask.style.visibility = 'hidden';
                        mask.classList.remove('active');
                    }
                }, 4000);
            }
        }

        async function init() {
            const notifications = await render();
            updateLastModified(notifications);
            await renderFriendshipLinks();
            await renderTimelineWidget();
            initCollapsibleSections();
        }

        // 添加折叠功能事件全量绑定
        function initCollapsibleSections() {
            const toggleBtns = document.querySelectorAll('.collapse-toggle-btn');
            toggleBtns.forEach(btn => {
                btn.addEventListener('click', function () {
                    const header = this.closest('.section-header');
                    const contentContainer = header.nextElementSibling;
                    if (!contentContainer || !contentContainer.classList.contains('category-content')) return;

                    const isCollapsed = contentContainer.classList.contains('collapsed');

                    if (!isCollapsed) {
                        // Action: 收起 (Collapse)
                        // 强制截断，避免收起动画时出现内容溢出或重叠
                        contentContainer.style.overflow = 'hidden';

                        // 强制浏览器重绘以立即生效溢出隐藏
                        void contentContainer.offsetWidth;

                        contentContainer.classList.add('collapsed');
                        this.setAttribute('aria-expanded', 'false');
                        this.querySelector('.toggle-text').textContent = '展开';
                    } else {
                        // Action: 展开 (Expand)
                        // 在展开动画期间，必须保持 overflow: hidden 才能具有抽屉下推效果
                        contentContainer.style.overflow = 'hidden';

                        contentContainer.classList.remove('collapsed');
                        this.setAttribute('aria-expanded', 'true');
                        this.querySelector('.toggle-text').textContent = '收起';
                    }
                });
            });

            // 监听动画完成事件，动态释放 overflow 限制
            document.querySelectorAll('.category-content').forEach(container => {
                container.addEventListener('transitionend', function (e) {
                    // 当展开的 max-height 动画播放完毕时
                    if (e.propertyName === 'max-height' && !this.classList.contains('collapsed')) {
                        // 彻底展开后，收回 JS 的强制 overflow，使其回退为 visible
                        // 从而允许阴影、绝对定位端点等外部内容正常溢出显示
                        this.style.overflow = '';
                    }
                });
            });
        }

        async function renderFriendshipLinks() {
            try {
                const response = await fetch('./links.json?t=' + new Date().getTime());
                if (!response.ok) return;

                const links = await response.json();
                const listEl = document.getElementById('friendship-links-list');

                if (links && links.length > 0) {
                    listEl.innerHTML = links.map(link =>
                        `<li style="margin-bottom: 8px;"><a href="${link.url}" target="_blank">${link.name}</a></li>`
                    ).join('');
                } else {
                    listEl.innerHTML = '<li style="color: #999; list-style-type: none; margin-left: -20px;">暂无链接</li>';
                }
            } catch (error) {
                console.error('获取友情链接失败:', error);
            }
        }

        function toggleDarkMode() {
            // 添加过渡动画 class
            document.body.classList.add('theme-transition');

            // 强制浏览器重绘以确保动画 class 生效
            void document.body.offsetHeight;

            const isDark = document.body.classList.toggle('dark-mode');

            // 仅更新 localStorage，由 CSS 处理图标切换
            if (isDark) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }

            // 动画结束后移除过渡 class，增加 50ms 的缓冲时间防止动画末端被截断
            setTimeout(() => {
                document.body.classList.remove('theme-transition');
            }, 450);
        }

        // 监听系统主题变化
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
            const savedTheme = localStorage.getItem('theme');
            // 只有在用户没有手动覆盖的情况下，才跟随系统实时切换
            if (!savedTheme) {
                if (event.matches) {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            }
        });

        init();
    </script>
