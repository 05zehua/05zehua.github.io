<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25级少院5班通知中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
            color: #333;
            font-size: 18px;
        }

        /* 为数字和特定标签使用 Inter 字体 */
        .update-tag,
        .meta-item,
        .deadline,
        .target-text {
            font-family: 'Inter', sans-serif;
            font-variant-numeric: tabular-nums;
        }

        /* 背景淡入，随后水平飘动 */
        #welcome-text {
            position: fixed;
            top: 40%;
            left: 0;
            width: 100%;
            z-index: 9999;
            pointer-events: none;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: flex-start;
            padding-left: 10%;
        }

        .welcome-inner {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
        }

        .welcome-title {
            font-size: 3.8em;
            font-weight: bold;
            color: #333;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin: 0;
            line-height: 1.1;
            animation: welcomeDrift 1.8s ease-in-out both;
        }

        .update-tag {
            font-size: 3.0em;
            font-weight: 600;
            color: #007bff;
            background: none;
            border: none;
            padding: 0;
            box-shadow: none;
            backdrop-filter: none;
            margin: 0;
            letter-spacing: -1px;
            animation: welcomeDrift 1.8s ease-in-out both;
            animation-delay: 0.05s;
        }

        @keyframes welcomeDrift {
            0% {
                opacity: 0;
                transform: translateX(150px);
            }

            25% {
                opacity: 1;
                transform: translateX(0);
            }

            75% {
                opacity: 1;
                transform: translateX(0);
            }

            100% {
                opacity: 0;
                transform: translateX(-150px);
                visibility: hidden;
            }
        }

        /* 内容容器模糊动画 */
        #main-content {
            animation: blurSequence 1.9s forwards;
            opacity: 0;
        }

        @keyframes blurSequence {
            0% {
                filter: blur(20px);
                opacity: 0.3;
            }

            80% {
                filter: blur(20px);
                opacity: 0.3;
            }

            100% {
                filter: blur(0);
                opacity: 1;
            }
        }

        h1 {
            display: none;
        }

        .module-title {
            border-bottom: 2px solid #007bff;
            padding-bottom: 5px;
            margin-top: 30px;
            font-size: 1.5em;
            font-family: 'Inter', sans-serif;
        }

        /* 响应式瀑布流布局（保持左右顺序，消除底部留白） */
        #long-term-container,
        #instant-container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            align-items: flex-start;
        }

        .masonry-column {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 20px;
            min-width: 0;
        }

        @media (max-width: 768px) {

            #long-term-container,
            #instant-container {
                flex-direction: column;
            }

            .masonry-column {
                display: contents;
            }

            #welcome-text {
                padding-left: 5%;
            }

            .welcome-title {
                font-size: clamp(2rem, 11vw, 2.5rem);
                line-height: 1.2;
            }

            body {
                padding: 10px;
            }

            .update-tag {
                font-size: 2.1rem !important;
            }
        }



        .section-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 35px;
            margin-bottom: 5px;
            padding-bottom: 8px;
        }

        .section-header .module-title {
            margin: 0;
            border: none;
            padding: 0;
        }

        .section-update-tag {
            font-family: 'Inter', sans-serif;
            font-size: 0.8em;
            font-weight: 600;
            color: #007bff;
            background: rgba(0, 123, 255, 0.1);
            padding: 3px 12px;
            border-radius: 4px;
            font-variant-numeric: tabular-nums;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .card h3 {
            font-size: 1.4em;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .urgent {
            border: 2px solid #dc3545;
            background: #fff5f5;
            animation: urgentFlash 0.55s ease-in-out 2;
            animation-delay: 1.6s;
            animation-fill-mode: backwards;
        }

        @keyframes urgentFlash {

            0%,
            100% {
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
                background: #fff5f5;
            }

            50% {
                box-shadow: 0 0 12px rgba(220, 53, 69, 0.35);
                background: #ffe3e6;
            }
        }

        .normal {
            border: 2px solid #007bff;
            background: #f0f7ff;
        }

        .normal .deadline {
            color: #007bff;
            font-weight: bold;
            font-size: 1.1em;
        }

        .urgent .deadline {
            color: #dc3545;
            font-weight: bold;
            font-size: 1.1em;
        }

        .expired {
            background: #e9ecef;
            color: #6c757d;
        }

        .expired .meta,
        .expired .meta .target-text,
        .expired .meta .deadline {
            color: #6c757d !important;
        }

        .expired img {
            filter: grayscale(100%);
            opacity: 0.6;
        }

        .meta {
            font-size: 0.92em;
            color: #666;
            margin-bottom: 12px;
            border-bottom: 1px dashed rgba(0, 0, 0, 0.1);
            padding-bottom: 8px;
            display: flex;
            flex-wrap: wrap;
            column-gap: 5px;
            row-gap: 8px;
            align-items: center;
            width: 100%;
        }

        .meta-sep {
            color: #ddd;
            flex-shrink: 0;
            margin: 0 1px;
        }

        @media (max-width: 768px) {
            .meta-sep {
                display: none;
            }

            .meta {
                column-gap: 12px;
            }
        }

        .meta-item {
            display: flex;
            align-items: center;
            white-space: nowrap;
            flex-shrink: 0;
            gap: 4px;
        }

        .meta-label {
            color: #666;
        }

        .target-text {
            font-weight: bold;
            color: #007bff;
        }

        .urgent .target-text {
            color: #dc3545;
        }

        .card .content-text a {
            color: #007bff;
            text-decoration: none;
            word-break: break-all;
        }

        .card .content-text a:hover {
            text-decoration: underline;
        }

        .card .content-text code {
            background: rgba(0, 0, 0, 0.05);
            padding: 2px 5px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
            color: #0e7cfa;
        }

        .card .content-text del {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .card .content-text ul {
            margin: 8px 0;
            padding-left: 20px;
            list-style-type: disc;
        }

        .card .content-text li {
            margin-bottom: 4px;
        }

        .images {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: auto;
            padding-top: 15px;
        }

        .images img {
            max-width: 180px;
            max-height: 180px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid #ddd;
            cursor: zoom-in;
            transition: transform 0.2s;
        }

        .images img:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        #image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

        #image-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 4px;
        }

        .footer-version {
            text-align: center;
            font-size: 0.75em;
            color: #999;
            margin-top: 40px;
            margin-bottom: 20px;
            font-family: 'Inter', sans-serif;
            animation: blurSequence 1.9s forwards;
            opacity: 0;
        }

        /* 倒计时圆环动画 */
        .countdown-ring {
            width: 16px;
            height: 16px;
            margin-left: 6px;
            transform: rotate(-90deg);
            display: inline-block;
            vertical-align: middle;
        }

        .countdown-ring circle {
            fill: none;
            stroke-width: 4;
        }

        .countdown-ring .ring-bg {
            stroke: #f8d7da;
        }

        .countdown-ring .ring-progress {
            stroke: #dc3545;
            stroke-linecap: round;
            /* 圆角端点 */
            stroke-dasharray: 62.83;
            /* 圆的周长 2 * π * r (r=10) */
            animation: ringFill 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* 通过 CSS 变量接收 JS 算出的目标进度 */
        @keyframes ringFill {
            from {
                stroke-dashoffset: 62.83;
            }

            to {
                stroke-dashoffset: var(--target-offset);
            }
        }
    </style>
</head>

<body>
    <div id="welcome-text">
        <div class="welcome-inner">
            <div class="welcome-title">25级少院5班通知中心</div>
            <div id="last-update" class="update-tag">正在获取更新日期...</div>
        </div>
    </div>

    <div id="main-content">
        <div class="section-header">
            <h2 class="module-title">通知</h2>
            <span id="long-term-update" class="section-update-tag"></span>
        </div>
        <div id="long-term-container">加载中...</div>

        <div class="section-header">
            <h2 class="module-title">活动通知</h2>
            <span id="instant-update" class="section-update-tag"></span>
        </div>
        <div id="instant-container">加载中...</div>
    </div>

    <div id="image-modal" onclick="closeModal()">
        <img id="modal-image" src="" alt="放大图片">
    </div>

    <div class="footer-version">
        网站版本: 260309
    </div>

    <script>
        function openModal(src) {
            document.getElementById('modal-image').src = src;
            document.getElementById('image-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('image-modal').style.display = 'none';
        }

        async function fetchNotifications() {
            try {
                const response = await fetch('./data.json?t=' + new Date().getTime());
                if (!response.ok) return [];
                return await response.json();
            } catch (error) {
                console.error('获取通知失败:', error);
                return [];
            }
        }

        async function render() {
            const notifications = await fetchNotifications();
            const now = new Date();
            let activeNotifs = [];
            let maxLongTerm = 0;
            let maxInstant = 0;

            notifications.forEach(n => {
                const pubTime = new Date(n.publishTime).getTime();
                if (n.type === 'long-term') {
                    if (pubTime > maxLongTerm) maxLongTerm = pubTime;
                } else {
                    if (pubTime > maxInstant) maxInstant = pubTime;
                }

                const formatTime = (isoString) => {
                    if (!isoString) return '';
                    const d = new Date(isoString);
                    const M = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    // 如果原始字符串中没有包含时间部分（没有'T'也没有空格，通常长度<=10）
                    // 则认为只输入了日期，不展示具体的时分
                    if (isoString.length <= 10 && !isoString.includes('T') && !isoString.includes(' ')) {
                        return `${M}.${day}`;
                    }
                    const h = String(d.getHours()).padStart(2, '0');
                    const m = String(d.getMinutes()).padStart(2, '0');
                    return `${M}.${day} ${h}:${m}`;
                };

                let timeType = n.timeType || 'deadline';
                let status = 'normal', timeText = '', label = timeType === 'ongoing' ? '进行时间' : '距离截止';
                let diffMs = 0;
                let deadlineTime = null;

                if (timeType === 'ongoing') {
                    const startText = formatTime(n.ongoingStart);
                    const endText = formatTime(n.ongoingEnd);
                    if (startText && endText) {
                        timeText = `${startText} ~ ${endText}`;
                    } else if (startText) {
                        timeText = `${startText} 开始`;
                    } else if (endText) {
                        timeText = ` ~ ${endText} 结束`;
                    } else {
                        timeText = '长期进行';
                    }

                    let isUrgentByStart = false;
                    if (n.ongoingStart) {
                        const startTime = new Date(n.ongoingStart);
                        const startDiffMs = startTime - now;
                        // 如果距离开始时间不到24小时，或者刚开始不到24小时
                        if (startDiffMs >= -24 * 60 * 60 * 1000 && startDiffMs <= 24 * 60 * 60 * 1000) {
                            isUrgentByStart = true;
                        }
                    }

                    if (n.isUrgent || isUrgentByStart) {
                        status = 'urgent';
                    }

                    if (n.ongoingEnd) {
                        deadlineTime = new Date(n.ongoingEnd);
                        diffMs = deadlineTime - now;
                        const diffHours = diffMs / (1000 * 60 * 60);
                        if (diffHours < -24) return;
                        if (diffMs < 0) {
                            status = 'expired';
                            timeText = '已结束';
                        }
                    } else if (n.ongoingStart) {
                        // 如果没有结束时间，把开始时间作为结束时间来判断是否过期
                        deadlineTime = new Date(n.ongoingStart);
                        diffMs = deadlineTime - now;
                        const diffHours = diffMs / (1000 * 60 * 60);
                        if (diffHours < -24) return;
                        if (diffMs < 0) {
                            status = 'expired';
                            timeText = '已结束';
                        }
                    } else {
                        // 如果连开始时间都没有，当成无限期进行处理
                        deadlineTime = new Date('2099-12-31'); // 极大值防报错
                        diffMs = 10000000;
                    }
                } else {
                    if (!n.deadline) {
                        label = '有效期';
                        timeText = '长期有效';
                    } else if (n.deadline === 'TBD') {
                        label = '时间';
                        timeText = '待定';
                        if (n.isUrgent) status = 'urgent';
                    } else {
                        deadlineTime = new Date(n.deadline);
                        diffMs = deadlineTime - now;
                        const diffHours = diffMs / (1000 * 60 * 60);
                        if (diffHours < -24) return;

                        if (diffMs < 0) {
                            status = 'expired';
                            label = '已过期';
                            timeText = `${Math.floor(Math.abs(diffHours))}小时前`;
                        } else {
                            if (diffMs < 3 * 24 * 60 * 60 * 1000) {
                                status = 'urgent';
                            }
                            const d = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                            const h = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                            const m = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                            timeText = `${d}天 ${h}小时 ${m}分钟`;
                        }
                    }
                }
                activeNotifs.push({ ...n, diffMs, status, label, timeText, deadlineTime });
            });

            activeNotifs.sort((a, b) => {
                // 已过期的排在最后
                if (a.status === 'expired' && b.status !== 'expired') return 1;
                if (a.status !== 'expired' && b.status === 'expired') return -1;

                // 紧急（红色）的排在最前面
                if (a.status === 'urgent' && b.status !== 'urgent') return -1;
                if (a.status !== 'urgent' && b.status === 'urgent') return 1;

                // 同样状态下按距离截止时间排序
                if (a.status !== 'expired') return a.diffMs - b.diffMs;
                return b.deadlineTime - a.deadlineTime;
            });


            let longIndex = 0, instantIndex = 0;
            let longHtml1 = '', longHtml2 = '';
            let instantHtml1 = '', instantHtml2 = '';
            let longCol1Height = 0, longCol2Height = 0;
            let instantCol1Height = 0, instantCol2Height = 0;

            activeNotifs.forEach(n => {
                const pubDateObj = new Date(n.publishTime);
                const pubDate = `${pubDateObj.getFullYear()}.${pubDateObj.getMonth() + 1}.${pubDateObj.getDate()} ${pubDateObj.getHours()}:${pubDateObj.getMinutes().toString().padStart(2, '0')}`;

                const imgs = (n.images && n.images.length > 0)
                    ? n.images.map(src => `<img src="${src}" alt="通知配图" loading="lazy" onclick="openModal('${src}')">`).join('')
                    : '';

                const targetText = n.target ? n.target : '全体';
                const locHtml = (n.location && n.location.trim() !== '') ?
                    `<span class="meta-sep">|</span>
                            <span class="meta-item"><span class="meta-label">地点:</span> <span class="deadline">${n.location}</span></span>` : '';

                let currentOrder = n.type === 'long-term' ? longIndex : instantIndex;

                // 处理 Markdown 语法
                let processedContent = n.content
                    .replace(/~~(.*?)~~/g, '<del>$1</del>')
                    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                    .replace(/\*(.*?)\*/g, '<i>$1</i>')
                    .replace(/`(.*?)`/g, '<code>$1</code>')
                    .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>');

                // 处理以 * 开头的无序列表
                const lines = processedContent.split('\n');
                let inList = false;
                let finalLines = [];

                lines.forEach((line, idx) => {
                    const trimmedLine = line.trim();
                    if (trimmedLine.startsWith('* ')) {
                        if (!inList) {
                            finalLines.push('<ul style="margin: 4px 0; padding-left: 20px; list-style-position: outside;">');
                            inList = true;
                        }
                        finalLines.push(`<li>${trimmedLine.substring(2)}</li>`);
                    } else {
                        if (inList) {
                            finalLines.push('</ul>');
                            inList = false;
                            // 如果列表后面的紧接的是个空行，去掉这个空行产生的不必要换行
                            if (trimmedLine === '') return;
                        }
                        // 如果空行紧接在列表前面，也去掉，防止列表前间距过大
                        if (trimmedLine === '' && idx + 1 < lines.length && lines[idx + 1].trim().startsWith('* ')) {
                            return;
                        }
                        // 给非列表行增加换行，除非是最后一行
                        finalLines.push(line + (idx < lines.length - 1 ? '<br>' : ''));
                    }
                });
                if (inList) finalLines.push('</ul>');
                processedContent = finalLines.join('');

                // 计算 3 天内的倒计时进度圆环
                let ringHtml = '';
                const threeDaysMs = 3 * 24 * 60 * 60 * 1000;
                // 只有在 urgent 状态，且剩余时间大于 0 且小于等于 3 天时才显示
                if (n.status === 'urgent' && n.diffMs > 0 && n.diffMs <= threeDaysMs) {
                    const r = 10;
                    const c = 2 * Math.PI * r; // 圆周长约 62.83
                    const ratio = n.diffMs / threeDaysMs; // 剩余时间占3天的比例 (1代表满3天，0代表马上截止)

                    // 计算实线偏移量，offset=0 为整圈，offset=62.83 为空圈
                    const offset = c * (1 - ratio);

                    ringHtml = `
                        <svg class="countdown-ring" viewBox="0 0 24 24">
                            <circle class="ring-bg" cx="12" cy="12" r="10"></circle>
                            <circle class="ring-progress" cx="12" cy="12" r="10" style="--target-offset: ${offset};"></circle>
                        </svg>
                    `;
                }

                const html = `
                    <div class="card ${n.status}" style="order: ${currentOrder};">
                        <h3>${n.title}</h3>
                        <div class="meta">
                            <span class="meta-item">${pubDate}</span>
                            <span class="meta-sep">|</span>
                            <span class="meta-item"><span class="meta-label">对象:</span> <span class="target-text">${targetText}</span></span>
                            ${locHtml}
                            <span class="meta-sep">|</span>
                            <span class="meta-item"><span class="meta-label">${n.label}:</span> <span class="deadline">${n.timeText}</span>${ringHtml}</span>
                        </div>
                        <div class="content-text" style="line-height: 1.6;">${processedContent}</div>
                        ${imgs ? `<div class="images">${imgs}</div>` : ''}
                    </div>
                `;

                // 预估卡片高度以实现更均衡的瀑布流
                let estimatedHeight = 150; // 标题和meta等基础高度
                if (n.content) {
                    estimatedHeight += (n.content.length / 25) * 28; // 预估文本折行
                    const newlines = (n.content.match(/\n/g) || []).length;
                    estimatedHeight += newlines * 28; // 回车换行
                }
                if (n.images && n.images.length > 0) {
                    estimatedHeight += 160 * Math.ceil(n.images.length / 2); // 预估图片高度
                }

                if (n.type === 'long-term') {
                    if (longCol1Height <= longCol2Height) {
                        longHtml1 += html;
                        longCol1Height += estimatedHeight;
                    } else {
                        longHtml2 += html;
                        longCol2Height += estimatedHeight;
                    }
                    longIndex++;
                } else {
                    if (instantCol1Height <= instantCol2Height) {
                        instantHtml1 += html;
                        instantCol1Height += estimatedHeight;
                    } else {
                        instantHtml2 += html;
                        instantCol2Height += estimatedHeight;
                    }
                    instantIndex++;
                }
            });

            const longContainer = document.getElementById('long-term-container');
            if (longIndex === 0) {
                longContainer.innerHTML = '<p style="color:#999;">暂无通知</p>';
            } else {
                longContainer.innerHTML = `
                    <div class="masonry-column">${longHtml1}</div>
                    <div class="masonry-column">${longHtml2}</div>
                `;
            }

            const instantContainer = document.getElementById('instant-container');
            if (instantIndex === 0) {
                instantContainer.innerHTML = '<p style="color:#999;">暂无通知</p>';
            } else {
                instantContainer.innerHTML = `
                    <div class="masonry-column">${instantHtml1}</div>
                    <div class="masonry-column">${instantHtml2}</div>
                `;
            }

            // 更新分类更新时间
            const formatDate = (ts) => {
                if (!ts) return '';
                const d = new Date(ts);
                return `${d.getFullYear()}.${d.getMonth() + 1}.${d.getDate()}`;
            };
            if (maxLongTerm) document.getElementById('long-term-update').innerText = `最后更新: ${formatDate(maxLongTerm)}`;
            else document.getElementById('long-term-update').style.display = 'none';

            if (maxInstant) document.getElementById('instant-update').innerText = `最后更新: ${formatDate(maxInstant)}`;
            else document.getElementById('instant-update').style.display = 'none';

            return notifications;
        }

        async function updateLastModified(notifications) {
            const lastUpdateElem = document.getElementById('last-update');
            if (notifications && notifications.length > 0) {
                const timestamps = notifications.map(n => new Date(n.publishTime).getTime()).filter(t => !isNaN(t));
                if (timestamps.length > 0) {
                    const latest = Math.max(...timestamps);
                    const date = new Date(latest);
                    const displayDate = `${date.getFullYear()}.${date.getMonth() + 1}.${date.getDate()}`;
                    lastUpdateElem.innerText = `最后更新: ${displayDate}`;
                } else {
                    lastUpdateElem.style.display = 'none';
                }
            } else {
                lastUpdateElem.style.display = 'none';
            }
        }

        async function init() {
            const notifications = await render();
            updateLastModified(notifications);
        }

        init();
    </script>
</body>

</html>
